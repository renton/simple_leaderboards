# Redis config for simple-leaderboards.
# This container is reachable only from the internal compose network — never
# expose it to the host or the public internet.

bind 0.0.0.0
protected-mode no
port 6379

# Cap memory and evict least-recently-used keys when full. The leaderboard
# cache version-key scheme tolerates LRU eviction (queries simply re-populate
# the cache; staleness is bounded by the TTL fallback).
maxmemory 256mb
maxmemory-policy allkeys-lru

# Persistence. RDB snapshots are enough for this workload; we don't need
# AOF durability for a cache + ephemeral session nonces.
save 900 1
save 300 10
save 60 10000

# Disable dangerous commands that have no use case here.
rename-command FLUSHALL ""
rename-command CONFIG ""
rename-command DEBUG ""

# Logging
loglevel notice
