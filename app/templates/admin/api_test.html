{% extends "base.html" %}
{% block title %}API Test — Simple Leaderboards{% endblock %}
{% block content %}
<section class="card">
  <h1>API Test</h1>
  <p class="muted">Build a <code>GET /api/v1/leaderboards</code> request and inspect the response.</p>

  <div class="filter-form">
    <div class="filter-row">
      <div class="field">
        <label for="param-game">Game</label>
        <select id="param-game">
          {% for g in games %}
            <option value="{{ g.slug }}">{{ g.name }} ({{ g.slug }})</option>
          {% endfor %}
        </select>
      </div>
      <div class="field">
        <label for="param-range">Range</label>
        <select id="param-range">
          {% for r in range_options %}
            <option value="{{ r }}">{{ r }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="field">
        <label for="param-sort">Sort</label>
        <select id="param-sort">
          {% for s in sort_options %}
            <option value="{{ s }}">{{ s }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="filter-row">
      <div class="field">
        <label for="param-seed">Seed</label>
        <input id="param-seed" type="text" placeholder="leave blank for unseeded">
      </div>
      <div class="field">
        <label for="param-name">Player name</label>
        <input id="param-name" type="text" placeholder="optional filter">
      </div>
      <div class="field">
        <label for="param-page-size">Page size</label>
        <input id="param-page-size" type="number" value="{{ default_page_size }}" min="1" max="{{ max_page_size }}">
      </div>
      <div class="field">
        <label for="param-page">Page</label>
        <input id="param-page" type="number" value="1" min="1">
      </div>
    </div>

    <div class="api-test-url-row">
      <span class="muted" style="font-size:0.85em;">Request URL</span>
      <code id="request-url" class="url-preview"></code>
    </div>

    <div class="actions">
      <button class="button-primary" id="send-btn" type="button">Send Request</button>
      <button class="button-secondary" id="clear-btn" type="button">Clear</button>
    </div>
  </div>
</section>

<section class="card" id="response-card" style="display:none">
  <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
    <h2 style="margin:0;">Response</h2>
    <span id="status-badge" class="status-badge"></span>
  </div>
  <pre id="response-body" class="json-output"></pre>
</section>

<style>
.api-test-url-row {
  display: flex;
  flex-direction: column;
  gap: 4px;
  margin: 10px 0 6px;
}
.url-preview {
  display: block;
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 8px 10px;
  font-size: 0.85em;
  word-break: break-all;
  color: var(--accent);
  min-height: 2em;
}
.json-output {
  background: var(--panel-2);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  overflow-x: auto;
  font-family: ui-monospace, "JetBrains Mono", monospace;
  font-size: 0.85em;
  line-height: 1.6;
  margin: 0;
  white-space: pre-wrap;
  word-break: break-word;
}
.status-badge {
  padding: 4px 10px;
  border-radius: 99px;
  font-size: 0.85em;
  font-weight: 600;
}
.status-ok   { background: #1d2f1d; color: var(--ok); }
.status-err  { background: #2d1a1a; color: var(--danger); }
.status-info { background: #1f2a3a; color: var(--accent); }

/* JSON syntax colouring */
.json-key    { color: #9ec4f0; }
.json-string { color: #b5e4a0; }
.json-number { color: #f0c070; }
.json-bool   { color: #d08080; }
.json-null   { color: var(--muted); }
</style>

<script>
(function () {
  const inputs = ['param-game','param-range','param-sort','param-seed','param-name','param-page-size','param-page'];

  function buildUrl() {
    const game     = document.getElementById('param-game').value;
    const range    = document.getElementById('param-range').value;
    const sort     = document.getElementById('param-sort').value;
    const seed     = document.getElementById('param-seed').value.trim();
    const name     = document.getElementById('param-name').value.trim();
    const pageSize = document.getElementById('param-page-size').value;
    const page     = document.getElementById('param-page').value;

    const params = new URLSearchParams({ game, range, sort, page_size: pageSize, page });
    if (seed) params.set('seed', seed);
    if (name) params.set('name', name);

    return '/api/v1/leaderboards?' + params.toString();
  }

  function updateUrl() {
    document.getElementById('request-url').textContent = buildUrl();
  }

  inputs.forEach(id => {
    const el = document.getElementById(id);
    el.addEventListener('input', updateUrl);
    el.addEventListener('change', updateUrl);
  });

  updateUrl();

  function syntaxHighlight(json) {
    json = json.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    return json.replace(
      /("(\\u[a-fA-F0-9]{4}|\\[^u]|[^\\"])*"(\s*:)?|\b(true|false|null)\b|-?\d+(?:\.\d*)?(?:[eE][+\-]?\d+)?)/g,
      function (match) {
        if (/^"/.test(match)) {
          return /:$/.test(match)
            ? '<span class="json-key">' + match + '</span>'
            : '<span class="json-string">' + match + '</span>';
        }
        if (/true|false/.test(match)) return '<span class="json-bool">' + match + '</span>';
        if (/null/.test(match))       return '<span class="json-null">' + match + '</span>';
        return '<span class="json-number">' + match + '</span>';
      }
    );
  }

  document.getElementById('send-btn').addEventListener('click', async function () {
    const url = buildUrl();
    const btn = this;
    btn.disabled = true;
    btn.textContent = 'Sending…';

    const card   = document.getElementById('response-card');
    const body   = document.getElementById('response-body');
    const badge  = document.getElementById('status-badge');

    card.style.display = 'block';
    body.innerHTML = '<span class="muted">Loading…</span>';
    badge.textContent = '';
    badge.className = 'status-badge';

    try {
      const resp = await fetch(url, { headers: { 'Accept': 'application/json' } });
      const text = await resp.text();

      let pretty;
      try {
        pretty = JSON.stringify(JSON.parse(text), null, 2);
        body.innerHTML = syntaxHighlight(pretty);
      } catch (_) {
        body.textContent = text;
      }

      if (resp.ok) {
        badge.textContent = resp.status + ' OK';
        badge.className = 'status-badge status-ok';
      } else {
        badge.textContent = resp.status + ' ' + resp.statusText;
        badge.className = 'status-badge status-err';
      }
    } catch (err) {
      body.textContent = 'Request failed: ' + err.message;
      badge.textContent = 'Error';
      badge.className = 'status-badge status-err';
    } finally {
      btn.disabled = false;
      btn.textContent = 'Send Request';
    }
  });

  document.getElementById('clear-btn').addEventListener('click', function () {
    document.getElementById('response-card').style.display = 'none';
  });
})();
</script>
{% endblock %}
