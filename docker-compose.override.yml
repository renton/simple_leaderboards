  services:
    db: !reset null
    redis: !reset null

    app:
      container_name: leaderboards-app
      restart: unless-stopped
      depends_on: !reset []
      environment:
        POSTGRES_HOST: postgres
        POSTGRES_PORT: "5432"
        POSTGRES_USER: leaderboards
        POSTGRES_PASSWORD: ${LEADERBOARDS_DB_PASSWORD}
        POSTGRES_DB: leaderboards
        REDIS_URL: redis://:${REDIS_PASSWORD}@redis:6379/0
        REDIS_RATELIMIT_URL: redis://:${REDIS_PASSWORD}@redis:6379/1
      networks:
        - internal
        - shared

  networks:
    shared:
      name: shared
      external: true
